services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: url_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes :
      - postgres-data:/var/lib/postgresql/data

  flask:
    build: .
    
    ports:
      - "8000:5000"
    environment:
      DB_HOST: postgres
      DB_NAME: url_db
      DB_USER: admin
      DB_PASSWORD: password
    depends_on:
      -postgres
  
    